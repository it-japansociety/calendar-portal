name: Calendar Sync

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:          # allows manual trigger from the GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Sync JotForm submissions to Cloudflare D1
        run: |
          SINCE=$(date -u -d "2 hours ago" +"%Y-%m-%d %H:%M:%S")
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://calendar-portal.japan-society-account.workers.dev/api/import \
            -H "Authorization: Bearer ${{ secrets.JOTFORM_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"dry_run\": false, \"since_date\": \"$SINCE\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Sync failed with status $HTTP_CODE"
            exit 1
          fi

          echo "Sync complete"
