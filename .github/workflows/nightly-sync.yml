name: Calendar Sync

on:
  schedule:
    - cron: '*/15 * * * *'  # Incremental sync every 15 minutes (new + edited submissions)
    - cron: '7 5 * * *'     # Daily reconcile at 05:07 UTC (archives rows no longer active in JotForm)
  workflow_dispatch:          # allows manual trigger from the GitHub Actions tab
    inputs:
      full_backfill:
        description: 'Re-import ALL submissions (no date filter). Use to backfill/repair every record.'
        type: boolean
        default: false
      reconcile:
        description: 'Archive D1 rows whose submission is no longer active in JotForm (trashed/archived there). Rows are kept for historical reference.'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Sync JotForm submissions to Cloudflare D1
        run: |
          # Three modes:
          #  - reconcile (daily cron or manual): archive D1 rows whose submission is
          #    no longer active in JotForm — rows are kept for historical reference
          #  - full backfill (manual): re-import every submission to repair all records
          #  - incremental (default, every 15 min): only submissions created OR EDITED
          #    in the last 2 hours; the import upserts rows in place, so a sync never
          #    rewrites the whole table
          if [ "${{ github.event.schedule }}" = "7 5 * * *" ] || [ "${{ inputs.reconcile }}" = "true" ]; then
            PAYLOAD='{"dry_run": false, "reconcile": true}'
            echo "Running RECONCILE (archive rows no longer active in JotForm)"
          elif [ "${{ inputs.full_backfill }}" = "true" ]; then
            PAYLOAD='{"dry_run": false}'
            echo "Running FULL backfill (all submissions)"
          else
            SINCE=$(date -u -d "2 hours ago" +"%Y-%m-%d %H:%M:%S")
            PAYLOAD="{\"dry_run\": false, \"since_date\": \"$SINCE\"}"
            echo "Running incremental sync since $SINCE"
          fi
          # CF-Access-Client-Id / -Secret authenticate the request to the
          # Cloudflare Access (Zero Trust) service token, so the automated
          # job is allowed through SSO. Authorization: Bearer is the JotForm
          # API key the import route uses to call the JotForm API.
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://calendar-portal.japan-society-account.workers.dev/api/import \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            -H "Authorization: Bearer ${{ secrets.JOTFORM_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Sync failed with status $HTTP_CODE"
            exit 1
          fi

          echo "Sync complete"
